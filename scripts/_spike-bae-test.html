<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BAE Unified Checkout Spike</title>
<style>
 body{font-family:-apple-system,Segoe UI,sans-serif;max-width:720px;margin:32px auto;padding:0 16px;color:#222}
 .step{border:1px solid #ddd;border-radius:8px;padding:16px;margin:16px 0}
 button{background:#1f6feb;color:#fff;border:0;border-radius:6px;padding:10px 16px;font:inherit;cursor:pointer;margin-right:8px}
 button:disabled{background:#aaa;cursor:not-allowed}
 pre{background:#f6f8fa;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;max-height:320px;white-space:pre-wrap}
 .ok{color:#1a7f37}.bad{color:#b42318}.warn{color:#b54708}
 #payment-form{min-height:220px;border:1px dashed #ccc;border-radius:8px;margin:12px 0}
</style>
</head>
<body>
<h1>BAE Unified Checkout — Spike</h1>
<p>Official flow: capture-context → Accept(token) → unifiedPayments() → show() → complete().</p>

<div class="step">
 <h2>1. Start checkout</h2>
 <button id="btnStart">Fetch context + mount form</button>
 <pre id="log1">(idle)</pre>
</div>

<div class="step">
 <h2>2. Payment form</h2>
 <div id="payment-form"></div>
 <pre id="log2">(waiting for step 1)</pre>
</div>

<div class="step">
 <h2>3. Result</h2>
 <button id="btnComplete" disabled>3a. up.complete() — documented path</button>
 <button id="btnFinalize" disabled>3b. POST /finalize — server-side attempt</button>
 <pre id="log3">(waiting for step 2)</pre>
</div>

<script>
const $=id=>document.getElementById(id);
const log=(el,m,c)=>{el.textContent=typeof m==='string'?m:JSON.stringify(m,null,2);el.className=c||''};
let up=null, transientToken=null;

$('btnStart').onclick=async()=>{
 log($('log1'),'Fetching capture-context…');
 let resp,data;
 try{
  resp=await fetch('/api/payments/_spike/capture-context',{
   method:'POST',headers:{'Content-Type':'application/json'},
   body:JSON.stringify({targetOrigin:location.origin})
  });
  data=await resp.json();
 }catch(e){return log($('log1'),'Fetch failed: '+e.message,'bad')}
 if(!resp.ok)return log($('log1'),'HTTP '+resp.status+'\n'+JSON.stringify(data,null,2),'bad');
 const jwt=data.token||data.keyId;
 if(!jwt||!data.clientLibrary)return log($('log1'),'Unexpected shape:\n'+JSON.stringify(data,null,2),'bad');
 log($('log1'),'OK — token acquired. Loading SDK…','ok');
 try{
  await new Promise((res,rej)=>{const s=document.createElement('script');
   s.src=data.clientLibrary;s.integrity=data.clientLibraryIntegrity;s.crossOrigin='anonymous';
   s.onload=res;s.onerror=()=>rej(new Error('SDK load failed (integrity/network)'));
   document.head.appendChild(s)});
 }catch(e){return log($('log1'),e.message,'bad')}
 log($('log1'),'SDK loaded (SRI verified). Initializing Unified Checkout…','ok');
 try{
  const accept=await Accept(jwt);
  up=await accept.unifiedPayments();
  log($('log2'),'Form rendering — card 4111 1111 1111 1111, any future expiry, any CVV. Submit inside the form.','ok');
  transientToken=await up.show({containers:{paymentSelection:'#payment-form'}});
  log($('log2'),'Transient token acquired.','ok');
  $('btnComplete').disabled=false;$('btnFinalize').disabled=false;
 }catch(e){log($('log2'),'UC init/show failed: '+(e&&e.message||e),'bad')}
};

$('btnComplete').onclick=async()=>{
 log($('log3'),'Calling up.complete()… (3DS challenge may appear)');
 try{
  const result=await up.complete(transientToken);
  log($('log3'),result,result&&result.status==='COMPLETED'?'ok':'warn');
 }catch(e){log($('log3'),'complete() failed: '+(e&&e.message||e),'bad')}
};

$('btnFinalize').onclick=async()=>{
 log($('log3'),'POSTing /finalize…');
 try{
  const r=await fetch('/api/payments/_spike/finalize',{method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({transientToken})});
  const d=await r.json();
  log($('log3'),d,(d.upstream&&d.upstream.status<300)?'ok':'warn');
 }catch(e){log($('log3'),'finalize failed: '+e.message,'bad')}
};
</script>
</body>
</html>
